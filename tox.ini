[tox]
env_list = py312,py313,lint,type,docs
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run tests with pytest
extras = dev
commands =
    pytest {posargs}

[testenv:lint]
description = Run linting with ruff
skip_install = True
deps = ruff>=0.2.0
commands =
    ruff check src tests
    ruff format --check src tests

[testenv:format]
description = Format code with ruff
skip_install = True
deps = ruff>=0.2.0
commands =
    ruff check --fix src tests
    ruff format src tests

[testenv:type]
description = Run type checking with mypy
extras = dev
commands =
    mypy src

[testenv:docs]
description = Build documentation with Sphinx
extras = docs
changedir = docs
commands =
    sphinx-build -W -b html . _build/html

[testenv:coverage]
description = Generate coverage report
extras = dev
commands =
    pytest --cov=wfirma --cov-report=term-missing --cov-report=html --cov-report=xml
